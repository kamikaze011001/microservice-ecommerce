spring:
  application:
    name: cloud-gateway
  config:
    import: optional:vault://
  cloud:
    gateway:
      routes:
        - id: authorization-server
          uri: lb://AUTHORIZATION-SERVER
          predicates:
            - Path=/authorization-server/**
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory-service/**
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/product-service/**
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/order-service/**
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payment-service/**
        - id: bff-service
          uri: lb://BFF-SERVICE
          predicates:
            - Path=/bff-service/**
    vault:
      uri: http://localhost:8200
      token: ${VAULT_TOKEN}
      fail-fast: true
      kv:
        enabled: true
        backend: secret
        default-context: ecommerce
        application-name: gateway
springdoc:
  swagger-ui:
    urls:
      - name: gateway-service
        url: /v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: inventory-service
        url: /inventory-service/v3/api-docs
      - name: authorization-server
        url: /authorization-server/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: bff-service
        url: /bff-service/v3/api-docs
    enabled: true
    path: /swagger-ui.html
eureka:
  client:
    fetch-registry: true

application:
  gateway:
    cors:
      allowed-origins:
        - http://localhost:3000        # Vite/CRA dev
        - http://localhost:5173        # Vite default
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age: 3600

management:
  server:
    port: 19093
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  metrics:
    tags:
      application: ${spring.application.name}
