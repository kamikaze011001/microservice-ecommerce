spring:
  application:
    name: orchestrator-service
  cloud:
    vault:
      uri: http://localhost:8200
      token: ${VAULT_TOKEN}
      fail-fast: true
      kv:
        enabled: true
        backend: secret
        default-context: ecommerce
        application-name: orchestrator-service
  config:
    import: optional:vault://
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: false
      auto-offset-reset: latest
  jpa:
    hibernate:
      ddl-auto: update
application:
  kafka:
    group-id:
      mongo.event: mongo-event-group
    topics:
      mongo.event: ecommerce_db.ecommerce_inventory.event
      product-service.product.update-quantity: product-service.product.update-quantity
      order-service.order.success-status: order-service.order.success-status
      inventory-service.inventory-product.update-quantity: inventory-service.inventory-product.update-quantity
      order-service.order.failed-status: order-service.order.failed-status
      order-service.order.canceled-status: order-service.order.canceled-status
      inventory-service.product.update: inventory-service.product.update
  saga:
    timeout-check-interval: 60000    # milliseconds
    compensation-max-retries: 3
    saga-ttl-minutes: 30
management:
  server:
    port: 19999
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: ${spring.application.name}